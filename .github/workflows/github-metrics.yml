name: Generate GitHub Metrics

on:
  schedule:
    # Runs every day at approximately 3:30 AM IST
    - cron: "0 22 * * *"

  # Allows manual execution from the Actions tab
  workflow_dispatch:

  # Runs when this workflow file is changed
  push:
    branches:
      - main
    paths:
      - ".github/workflows/github-metrics.yml"

permissions:
  contents: write

concurrency:
  group: github-profile-metrics
  cancel-in-progress: true

jobs:
  generate-metrics:
    name: Generate profile metrics
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          # Personal access token stored in repository secrets
          token: ${{ secrets.METRICS_TOKEN }}

          # Your GitHub username
          user: NitinBharti007

          # Generated file
          filename: github-metrics.svg

          # Target branch
          committer_branch: main
          committer_message: "chore: update GitHub metrics"

          # General appearance
          template: classic
          config_timezone: Asia/Kolkata
          config_animations: yes
          config_twemoji: yes

          # Main profile information
          base: header, repositories
          base_hireable: yes

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 300
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8

          # Recent engineering activity
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_timestamps: yes
          plugin_activity_filter: issue, pr, release, review, ref/create

          # Pinned repositories
          plugin_repositories: yes
          plugin_repositories_pinned: 4
